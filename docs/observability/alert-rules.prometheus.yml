groups:
  - name: ecommerce-api-critical
    rules:
      - alert: EcommerceApiHigh5xxRate
        expr: |
          sum(rate(http_responses_class_total{class="5xx"}[5m]))
            /
          clamp_min(sum(rate(http_requests_total[5m])), 1)
          > 0.03
        for: 10m
        labels:
          severity: critical
          service: ecommerce-api
        annotations:
          summary: "High API 5xx rate"
          description: "5xx ratio above 3% for 10 minutes in ecommerce-api."

      - alert: EcommerceApiHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_ms_bucket[5m])) by (le)
          ) > 1200
        for: 10m
        labels:
          severity: warning
          service: ecommerce-api
        annotations:
          summary: "High API P95 latency"
          description: "P95 request latency above 1200ms for 10 minutes."

      - alert: MercadoPagoWebhook5xxSpike
        expr: |
          sum(rate(http_responses_class_total{class="5xx",path="/api/webhooks/mercadopago"}[10m])) > 0
        for: 5m
        labels:
          severity: critical
          service: ecommerce-api
          component: webhooks
        annotations:
          summary: "Mercado Pago webhook returning 5xx"
          description: "Webhook endpoint /api/webhooks/mercadopago is failing with 5xx responses."

      - alert: EventWorkerHealthEndpointUnavailable
        expr: |
          sum(rate(http_responses_class_total{class="5xx",path="/health"}[5m])) > 0
        for: 5m
        labels:
          severity: critical
          service: ecommerce-api
          component: workers
        annotations:
          summary: "Health endpoint instability"
          description: "Health endpoint produced 5xx, which may indicate worker/runtime failure."
      - alert: EcommerceApiAuth429Spike
        expr: |
          sum(rate(http_responses_total{status="429",path="/api/v1/auth/login"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          service: ecommerce-api
          component: anti-abuse
        annotations:
          summary: "Auth route hitting 429"
          description: "Login/auth routes are throttling requests and may indicate brute-force or abusive traffic."

      - alert: EcommerceApiCheckout429Spike
        expr: |
          sum(rate(http_responses_total{status="429",path=~"/api/v1/payments/checkout|/api/v1/payments/transparent|/api/v1/orders/from-cart"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          service: ecommerce-api
          component: anti-abuse
        annotations:
          summary: "Checkout route hitting 429"
          description: "Checkout/payment routes are throttling requests and may indicate abusive automation or retry storms."

      - alert: EcommerceApiWebhook429Spike
        expr: |
          sum(rate(http_responses_total{status="429",path=~"/api/webhooks/mercadopago|/api/webhooks/email|/api/webhooks/shipping|/api/v1/subscriptions/webhooks/billing"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
          service: ecommerce-api
          component: anti-abuse
        annotations:
          summary: "Webhook route hitting 429"
          description: "Webhook endpoints are throttling requests and may be overloaded or receiving abusive retries."

