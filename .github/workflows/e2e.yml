name: E2E — Playwright tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'info-tech-gamer-storefront-build/**'
      - 'src/**'

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: ecommerce
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U admin -d ecommerce" --health-interval=5s --health-timeout=5s --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h 127.0.0.1 -p 5433 -U admin && break || sleep 2
          done

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 9.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Apply migrations
        env:
          ConnectionStrings__DefaultConnection: "Host=127.0.0.1;Port=5433;Database=ecommerce;Username=admin;Password=changeme;"
        run: |
          dotnet restore src/Ecommerce.sln --configfile NuGet.config -m:1 /p:RestoreDisableParallel=true
          dotnet build src/Ecommerce.API -c Release --no-restore
          dotnet ef database update --project src/Ecommerce.API --startup-project src/Ecommerce.API

      - name: Start API
        run: |
          dotnet run --project src/Ecommerce.API --urls http://0.0.0.0:5071 &
          # wait for API
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5071/health >/dev/null; then
              break
            fi
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install storefront deps
        run: |
          if [ -f info-tech-gamer-storefront-build/package.json ]; then
            cd info-tech-gamer-storefront-build
            if [ -f pnpm-lock.yaml ]; then
              corepack enable
              pnpm install --frozen-lockfile
            else
              npm ci
            fi
          else
            echo "No storefront found; skipping"
            exit 0
          fi

      - name: Install Playwright browsers
        run: |
          cd info-tech-gamer-storefront-build
          npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          cd info-tech-gamer-storefront-build
          npx playwright test --reporter=list
