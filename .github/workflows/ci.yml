name: CI

"on":
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]

jobs:
  sdk-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            **/node_modules
            ~/.npm
            ~/.pnpm-store
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json', '**/pnpm-lock.yaml') }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.57.2
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Check OpenTelemetry guard
        run: |
          chmod +x scripts/check-otel-ci.sh
          scripts/check-otel-ci.sh
      - name: Check observability guard
        run: |
          chmod +x scripts/check-observability-ci.sh
          scripts/check-observability-ci.sh
      - name: Check production security config
        run: |
          chmod +x scripts/check-security-config-ci.sh
          scripts/check-security-config-ci.sh
      - name: Check secret logging guard
        run: |
          chmod +x scripts/check-log-secrets-ci.sh
          scripts/check-log-secrets-ci.sh
      - name: Run repository CI script
        run: |
          chmod +x ./scripts/ci/build-and-test.sh
          ./scripts/ci/build-and-test.sh

  ecommerce-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d ecommerce" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 9.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Restore .NET
        run: dotnet restore src/Ecommerce.sln --configfile NuGet.config -m:1 /p:RestoreDisableParallel=true

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 -U admin -d ecommerce && break || sleep 1;
          done

      - name: Run EF Migrations
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=ecommerce;Username=admin;Password=changeme;SslMode=Disable;"
        run: dotnet ef database update --startup-project src/Ecommerce.API/Ecommerce.API.csproj --no-build

      - name: Build solution
        run: dotnet build src/Ecommerce.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test tests/Ecommerce.API.Tests/Ecommerce.API.Tests.csproj --no-build --configuration Release --verbosity normal

      - name: Build admin frontend
        working-directory: admin-frontend
        run: |
          npm ci
          npm run build

      - name: Build storefront frontend
        working-directory: info-tech-gamer-storefront-build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Run E2E Playwright tests
        env:
          ASPNETCORE_ENVIRONMENT: Development
        run: |
          dotnet run --project src/Ecommerce.API/Ecommerce.API.csproj --no-build --urls "http://localhost:5071" &
          sleep 3
          cd admin-frontend
          npm run start &
          cd ..
          for i in {1..30}; do
            nc -z localhost 5071 && nc -z localhost 3000 && break || sleep 1
          done
          cd admin-frontend
          npx playwright install --with-deps
          PLAYWRIGHT_HTML_REPORT=playwright-report-bff-security NODE_OPTIONS=--max-old-space-size=4096 npx playwright test tests/bff-security.spec.ts --project=chromium --workers=1 --reporter=html --output=test-results-bff-security
          PLAYWRIGHT_HTML_REPORT=playwright-report-crm-critical NODE_OPTIONS=--max-old-space-size=4096 npx playwright test tests/crm-critical.spec.ts --project=chromium --workers=1 --reporter=html --output=test-results-crm-critical
          cd ../info-tech-gamer-storefront-build
          PLAYWRIGHT_HTML_REPORT=playwright-report-bff-security NODE_OPTIONS=--max-old-space-size=4096 npx playwright test tests/bff-security.spec.ts --project=chromium --workers=1 --reporter=html --output=test-results-bff-security
          cd ../admin-frontend
          npm run test:e2e








      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-ci
          if-no-files-found: warn
          path: |
            admin-frontend/test-results
            admin-frontend/playwright-report
            admin-frontend/test-results-bff-security
            admin-frontend/playwright-report-bff-security
            admin-frontend/test-results-crm-critical
            admin-frontend/playwright-report-crm-critical
            info-tech-gamer-storefront-build/test-results-bff-security
            info-tech-gamer-storefront-build/playwright-report-bff-security

