name: CI Integration
"on": [push, pull_request]

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: ecommerce
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U admin -d ecommerce" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      API_URL: http://localhost:5071
      FRONTEND_PORT: 3003

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Install dotnet-ef
        run: |
          dotnet tool install --global dotnet-ef --version 9.*
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable pnpm via corepack
        run: corepack enable

      - name: Check OpenTelemetry guard
        run: |
          chmod +x scripts/check-otel-ci.sh
          scripts/check-otel-ci.sh
      - name: Check observability guard
        run: |
          chmod +x scripts/check-observability-ci.sh
          scripts/check-observability-ci.sh
      - name: Check production security config
        run: |
          chmod +x scripts/check-security-config-ci.sh
          scripts/check-security-config-ci.sh
      - name: Check secret logging guard
        run: |
          chmod +x scripts/check-log-secrets-ci.sh
          scripts/check-log-secrets-ci.sh
      - name: Restore and run migrations
        run: |
          cd src/Ecommerce.Infrastructure
          dotnet restore --configfile "../../NuGet.config" -m:1 /p:RestoreDisableParallel=true
          dotnet ef database update --startup-project "../Ecommerce.API/Ecommerce.API.csproj" --connection "Host=localhost;Port=5433;Database=ecommerce;Username=admin;Password=changeme;SslMode=Disable;"

      - name: Build backend
        run: |
          cd src/Ecommerce.API
          dotnet build --no-restore

      - name: Build admin frontend
        run: |
          cd admin-frontend
          npm ci
          npm run build

      - name: Build storefront frontend
        run: |
          cd info-tech-gamer-storefront-build
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Start services (background)
        run: |
          # Start API in background
          cd src/Ecommerce.API
          nohup dotnet run --urls "http://0.0.0.0:5071" >/tmp/api.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5071/health >/dev/null; then
              break
            fi
            sleep 2
          done
          # Start frontend on 3003
          cd ../../admin-frontend
          nohup npm run start:prod >/tmp/frontend.log 2>&1 &
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3003 >/dev/null; then
              break
            fi
            sleep 2
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright E2E (HTML report)
        env:
          FRONTEND_PORT: 3003
        run: |
          cd admin-frontend
          # run tests and generate an HTML report in admin-frontend/playwright-report
          npx playwright test --reporter=html --output=playwright-report

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          if-no-files-found: warn
          path: |
            admin-frontend/test-results
            admin-frontend/playwright-report
            /tmp/api.log
            /tmp/frontend.log







